services:
  - type: web
    name: dartup-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_DAYS
        value: 7
      - key: ONLINE_DISCONNECT_TIMEOUT_SECONDS
        value: 30
      - key: ONLINE_PRESENCE_SWEEP_INTERVAL_SECONDS
        value: 5
      - key: CORS_ORIGINS
        sync: false
      - key: GOOGLE_CLIENT_IDS
        sync: false
